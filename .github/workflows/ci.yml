name: CI
 
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
 
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
 
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
 
  test-unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:vitest
 
  test-backend:
    name: Backend Tests (xUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: dotnet restore backend/WordsNstuff.slnx
      - run: npm run test:xunit
 
  test-e2e:
    name: E2E & API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
 
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
 
      - run: npm ci
      - run: dotnet restore backend/WordsNstuff
      - run: npx playwright install
 
      - name: Start backend
        run: dotnet run --project backend/WordsNstuff --urls http://localhost:5001 > backend.log 2>&1 &

      - name: Wait for backend to be ready
        run: npx wait-on tcp:5001 --timeout 30000 || (cat backend.log && exit 1)
 
      - name: Run API tests
        run: npm run test:api
 
      - name: Run E2E tests
        run: npm run test:e2e
 
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
