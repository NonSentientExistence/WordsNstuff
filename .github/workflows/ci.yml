name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  test-unit:
    name: Unit Tests (Vitest)
    needs: [lint, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:vitest

  test-backend:
    name: Backend Tests (xUnit)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - run: dotnet test backend/WordsNstuff.Tests

  test-e2e:
    name: E2E & API Tests
    needs: [build, test-unit, test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Restore backend
        run: dotnet restore backend/WordsNstuff

      - name: Start backend
        run: dotnet run --project backend/WordsNstuff &

      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:5001 --timeout 60000

      - name: Run API tests
        run: npm run test:api

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/